spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true

spring.main.allow-circular-references=true
spring.main.lazy-initialization=true

management.tracing.sampling.probability=1.0
management.endpoint.health.enabled=false
management.prometheus.metrics.export.enabled=false
management.health.rabbit.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.show-sql=false

spring.jackson.default-property-inclusion=NON_NULL
cambium.i18n.defaultLocale=en

spring.flyway.enabled=true
spring.flyway.placeholder-replacement=false

twin.field.password.key=secret
twin.field.password.algorithm=PBEWithMD5AndDES
featurer.param.encrypt.key=secret
featurer.param.encrypt.algorithm=PBEWithMD5AndDES

api.unsecured.enable=false
twins.memory-info.secret-key=d1114eb0-213f-4536-bc58-064e565780b6

resilience4j.bulkhead.instances.api.max-concurrent-calls=50
resilience4j.bulkhead.instances.api.max-wait-duration=0ms
resilience4j.ratelimiter.instances.api.limit-for-period=200
resilience4j.ratelimiter.instances.api.limit-refresh-period=10s
resilience4j.ratelimiter.instances.api.timeout-duration=0ms

app.cache.auth-token.initial-capacity=1000
app.cache.auth-token.max-size=10000
app.cache.auth-token.max-ttl=10m
app.cache.auth-token.clock-skew=5s
app.cache.user-permissions.initial-capacity=1000
app.cache.user-permissions.max-size=10000
app.cache.user-permissions.ttl=1m
